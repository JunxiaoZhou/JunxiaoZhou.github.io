name: Update publication data, Scholar metrics, and deploy Pages

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 7 * * *"
      timezone: "Asia/Shanghai"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Complete publication metadata
        run: python3 scripts/fetch_publication_metadata.py

      - name: Fetch Google Scholar metrics
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python3 scripts/fetch_scholar_metrics.py

      - name: Build static homepage
        run: python3 scripts/build.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- content/publications.json content/scholar.json index.html; then
            echo "Publication and Scholar data are unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/publications.json content/scholar.json index.html
            git commit -m "Update publication and Scholar data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
